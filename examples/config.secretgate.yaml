runtime:
  mode: remote
  local_fallback: false
  stream: true
  disk_backed_memory: true
  in_memory_retrieval: false
  max_parallel_requests: 1

provider:
  kind: anthropic
  model: your-provider-model-id
  api_key_env: ANTHROPIC_API_KEY
  request_timeout_seconds: 120
  max_output_tokens: 4096

policy:
  prefer_min_ram: true
  start_ollama_automatically: false
  allow_remote_provider: true
  require_explicit_opt_in_for_local_model: true

security:
  require_secretgate: true
  expected_proxy_hosts:
    - 127.0.0.1
    - localhost
  expected_proxy_port: 8083
  heartbeat_file: heartbeat.md
  heartbeat_json_file: .micro-claw/heartbeat.json
  default_heartbeat_interval_seconds: 300
